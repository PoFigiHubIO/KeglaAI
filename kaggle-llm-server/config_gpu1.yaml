model:
  source: hf
  repo_id: llmfan46/gemma-4-12B-agentic-fable5-composer2.5-v2-3.5x-tau2-uncensored-heretic-GGUF
  filename: gemma-4-12B-agentic-fable5-composer2.5-v2-3.5x-tau2-uncensored-heretic-Q6_K.gguf
  direct_url: ''
  gdrive_file_id: ''
  hf_token_env: HF_TOKEN
  local_dir: ./models
  verify_sha256: false
  sha256: ''
  mmproj_enabled: true
  mmproj_filename: gemma-4-12B-agentic-fable5-composer2.5-v2-3.5x-tau2-uncensored-heretic-mmproj-F16.gguf
  mmproj_sha256: ''
  mmproj_gdrive_file_id: ''
llama_cpp:
  repo_url: https://github.com/ggml-org/llama.cpp.git
  branch: master
  build_dir: ./llama.cpp
  cuda_arch: '75'
  jobs: 4
  prebuilt_gdrive_file_id: ''
server:
  host: 0.0.0.0
  port: 8081
  api_key: ''
  webui: true
  jinja: true
  webui_mcp_proxy: true
  n_gpu_layers: -1
  ctx_size: 0
  ctx_size_min: 0
  batch_size: 0
  ubatch_size: 0
  threads: 0
  threads_batch: 0
  flash_attn: true
  mmap: true
  mlock: false
  tensor_split: auto
  split_mode: layer
  parallel: 1
  cont_batching: true
  rope_scaling: none
  rope_freq_base: 0
  rope_freq_scale: 0
  cache_type_k: q8_0
  cache_type_v: q8_0
  log_file: ./logs/llama-server_8081.log
tunnel:
  # provider: cloudflared
  provider: ngrok
  ngrok_token_env: NGROK_AUTHTOKEN
  ngrok_domain: ''         # Бесплатный статический домен Ngrok (например, name.ngrok-free.app)
  cloudflare_token: ''     # Токен вашего постоянного Cloudflare Tunnel
  cloudflare_domain: ''    # Ваш домен (например, kaggle.my-domain.com), привязанный к токену
mcp:
  enabled: true
  config_file: ./mcp/mcp_servers.json
vscode:
  generate_configs: true
  output_dir: ./vscode
project_source:
  github_repo: PoFigiHubIO/KeglaAI
  github_branch: main
  github_subdir: kaggle-llm-server
  sync_on_notebook_start: true
